<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="180mm" height="180mm" viewBox="0 0 180 180">
  <title>A1 Mini full-plate sweep path</title>
  <desc>
    XY-only sweep path for a 180x180 mm build plate.
    Note: SVG cannot encode Z height. Intended hover height is 3 mm above the bed when converted to machine motion.
  </desc>

  <!-- Build plate boundary -->
  <rect x="0" y="0" width="180" height="180" fill="none" stroke="#999" stroke-width="0.8"/>

  <!-- Margin boundary -->
  <rect x="10" y="10" width="160" height="160" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- Sweep path -->
  <path d="
    M 10 10
    L 170 10
    L 170 25
    L 10 25
    L 10 40
    L 170 40
    L 170 55
    L 10 55
    L 10 70
    L 170 70
    L 170 85
    L 10 85
    L 10 100
    L 170 100
    L 170 115
    L 10 115
    L 10 130
    L 170 130
    L 170 145
    L 10 145
    L 10 160
    L 170 160
    L 170 170
    L 10 170
  " fill="none" stroke="#111" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Start point -->
  <circle cx="10" cy="10" r="2.2" fill="#111"/>
  <text x="14" y="8" font-family="Arial, sans-serif" font-size="6">Start</text>

  <!-- Notes -->
  <text x="10" y="177" font-family="Arial, sans-serif" font-size="5">
    Plate: 180x180 mm | Path margin: 10 mm | Intended hover height when converted: Z = 3 mm
  </text>
</svg>
